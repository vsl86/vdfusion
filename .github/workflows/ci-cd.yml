name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ---------------------------------------------------------------------------
# Runner selection
# By default this workflow uses GitHub-hosted cloud runners.
# Override by setting repository variables in Settings → Variables:
#   RUNNER_MACOS  →  '["self-hosted","macOS","ARM64"]'
#   RUNNER_LINUX  →  '["self-hosted","Linux","X64","casa"]'
# ---------------------------------------------------------------------------

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test & Verify
    runs-on: ${{ vars.RUNNER_MACOS && fromJSON(vars.RUNNER_MACOS) || 'macos-15' }}
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install System Dependencies
        run: |
          if command -v brew >/dev/null 2>&1; then
            for pkg in pkg-config ffmpeg; do
              brew list $pkg >/dev/null 2>&1 || brew install $pkg
            done
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y pkg-config ffmpeg
          fi

      - name: Install Wails
        run: command -v wails >/dev/null 2>&1 || go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run Go Tests
        run: go test -v ./...

  # ── 2. Build App Docker image ──────────────────────────────────────────────
  docker-app:
    name: Build & Push App Docker
    runs-on: ${{ vars.RUNNER_LINUX && fromJSON(vars.RUNNER_LINUX) || 'ubuntu-latest' }}
    needs: [test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata (app)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{raw}}
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set Version Info
        id: versioning
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION=$(git describe --tags --always --dirty)
          fi
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}"   >> $GITHUB_OUTPUT

      - name: Build and push (app)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.versioning.outputs.version }}
            COMMIT=${{ steps.versioning.outputs.commit }}

  # ── 3. Build Neural backend Docker image ──────────────────────────────────
  docker-neural:
    name: Build & Push Neural Docker
    runs-on: ${{ vars.RUNNER_LINUX && fromJSON(vars.RUNNER_LINUX) || 'ubuntu-latest' }}
    needs: [test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata (neural)
        id: meta-neural
        uses: docker/metadata-action@v5
        with:
          # Publish as ghcr.io/<owner>/<repo>-neural
          images: ghcr.io/${{ github.repository }}-neural
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{raw}}
            type=sha,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (neural)
        uses: docker/build-push-action@v5
        with:
          context: neural
          file: neural/Dockerfile
          push: true
          # amd64 only — CoreML is N/A inside CI Docker, so ONNX CPU is the target
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-neural.outputs.tags }}
          labels: ${{ steps.meta-neural.outputs.labels }}
          cache-from: type=gha,scope=neural
          cache-to:   type=gha,mode=max,scope=neural

  # ── 4. Build Desktop Artifacts ────────────────────────────────────────────
  build:
    name: Build All Artifacts
    runs-on: ${{ vars.RUNNER_MACOS && fromJSON(vars.RUNNER_MACOS) || 'macos-15' }}
    needs: [test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          if command -v brew >/dev/null 2>&1; then
            for pkg in nsis dylibbundler create-dmg pkg-config ffmpeg mingw-w64 p7zip; do
              brew list $pkg >/dev/null 2>&1 || brew install $pkg
            done
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails
        run: command -v wails >/dev/null 2>&1 || go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Setup Windows FFmpeg Headers/Libs (for CGO)
        run: |
          curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z -o ffmpeg_shared.7z
          7z x ffmpeg_shared.7z -offmpeg-win-x64
          mv ffmpeg-win-x64/ffmpeg-*-shared ffmpeg-win-x64/dist
          echo "WINDOWS_AMD64_CGO_LDFLAGS=-L$GITHUB_WORKSPACE/ffmpeg-win-x64/dist/lib" >> $GITHUB_ENV
          echo "WINDOWS_AMD64_CGO_CFLAGS=-I$GITHUB_WORKSPACE/ffmpeg-win-x64/dist/include" >> $GITHUB_ENV

      - name: Set Version Info
        id: versioning
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION=$(git describe --tags --always --dirty)
          fi
          COMMIT=$(git rev-parse --short HEAD)

          VERSION_NUMERIC=$(echo "${VERSION}" | sed -E 's/^v//; s/-.*//')
          if [[ ! $VERSION_NUMERIC =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION_NUMERIC="0.0.0"
          fi

          echo "version=${VERSION}"                 >> $GITHUB_OUTPUT
          echo "version_numeric=${VERSION_NUMERIC}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}"                   >> $GITHUB_OUTPUT
          echo "LDFLAGS=-X vdfusion/internal/version.Version=${VERSION} -X vdfusion/internal/version.Commit=${COMMIT}" >> $GITHUB_ENV

      - name: Build Wails (Multi-Platform)
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          FULL_VERSION: ${{ steps.versioning.outputs.version }}
          NUMERIC_VERSION: ${{ steps.versioning.outputs.version_numeric }}
        run: |
          # 1. Build macOS (ARM64)
          sed -i.bak "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"$FULL_VERSION\"/" wails.json
          wails build -ldflags "${{ env.LDFLAGS }}" -platform darwin/arm64

          # 2. Build Windows (AMD64)
          sed -i.bak "s/\"productVersion\": \".*\"/\"productVersion\": \"$NUMERIC_VERSION\"/" wails.json

          CGO_ENABLED=1 \
          CC=x86_64-w64-mingw32-gcc \
          CXX=x86_64-w64-mingw32-g++ \
          CGO_LDFLAGS="${{ env.WINDOWS_AMD64_CGO_LDFLAGS }}" \
          CGO_CFLAGS="${{ env.WINDOWS_AMD64_CGO_CFLAGS }}" \
          wails build -ldflags "${{ env.LDFLAGS }}" -platform windows/amd64

          # Copy FFmpeg DLLs to bin for inclusion in NSIS installer and ZIP
          cp ffmpeg-win-x64/dist/bin/*.dll build/bin/

          CGO_ENABLED=1 \
          CC=x86_64-w64-mingw32-gcc \
          CXX=x86_64-w64-mingw32-g++ \
          CGO_LDFLAGS="${{ env.WINDOWS_AMD64_CGO_LDFLAGS }}" \
          CGO_CFLAGS="${{ env.WINDOWS_AMD64_CGO_CFLAGS }}" \
          wails build -ldflags "${{ env.LDFLAGS }}" -nsis -webview2=embed -platform windows/amd64

      - name: Bundle Dylibs (macOS)
        run: |
          for APP_PATH in build/bin/*.app; do
            BINARY_PATH="$APP_PATH/Contents/MacOS/$(basename "$APP_PATH" .app)"
            echo "Bundling dylibs for $BINARY_PATH"
            mkdir -p "$APP_PATH/Contents/Frameworks"
            dylibbundler -of -cd -b -x "$BINARY_PATH" -d "$APP_PATH/Contents/Frameworks/" -p "@executable_path/../Frameworks/"
          done

      - name: Check for macOS Secrets
        id: secrets-check
        env:
          CERT: ${{ secrets.MACOS_CERTIFICATE }}
          AID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -n "$CERT" ]; then echo "has_cert=true" >> $GITHUB_OUTPUT; fi
          if [ -n "$AID" ];  then echo "has_apple_id=true" >> $GITHUB_OUTPUT; fi

      - name: Import macOS Certificates
        if: steps.secrets-check.outputs.has_cert == 'true'
        env:
          APPLE_CERT: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_CERT_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: "wails-keychain-pwd"
        run: |
          echo $APPLE_CERT | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Code Sign (macOS)
        if: steps.secrets-check.outputs.has_cert == 'true'
        run: |
          for APP_PATH in build/bin/*.app; do
            echo "Signing $APP_PATH"
            codesign --force --options runtime --entitlements build/darwin/entitlements.plist --sign "Developer ID Application" --deep "$APP_PATH"
          done

      - name: Create DMG (macOS)
        run: |
          for APP_PATH in build/bin/*.app; do
            APP_NAME=$(basename "$APP_PATH" .app)
            create-dmg \
              --volname "${APP_NAME}" --window-pos 200 120 --window-size 600 400 --icon-size 100 \
              --icon "${APP_NAME}.app" 175 120 --hide-extension "${APP_NAME}.app" --app-drop-link 425 120 \
              "build/bin/${APP_NAME}.dmg" "$APP_PATH"
          done

      - name: Notarize and Staple (macOS)
        if: steps.secrets-check.outputs.has_apple_id == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for DMG_PATH in build/bin/*.dmg; do
            echo "Notarizing DMG: $DMG_PATH"
            xcrun notarytool submit "$DMG_PATH" --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$TEAM_ID" --wait
            xcrun stapler staple "$DMG_PATH"
          done

      - name: Zip App Bundles (macOS)
        run: |
          cd build/bin
          for APP_PATH in *.app; do
            zip -r "${APP_PATH%.app}.zip" "$APP_PATH"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vdfusion-all-platforms
          path: |
            build/bin/*.exe
            build/bin/*.dmg
            build/bin/*.zip

  # ── 5. GitHub Release (on tag) ────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-app, docker-neural, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-bins

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bins/**/*-installer.exe
            release-bins/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 6. Rolling "latest" Release (on main push) ───────────────────────────
  latest-release:
    name: Update Latest Release
    runs-on: ubuntu-latest
    needs: [docker-app, docker-neural, build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-bins

      - name: Create Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: main
          name: "latest (unstable)"
          make_latest: true
          body: |
            This is a floating release containing the latest builds from the `main` branch.
            **Commit:** ${{ github.sha }}
          prerelease: true
          files: |
            release-bins/**/*-installer.exe
            release-bins/**/*.dmg
            release-bins/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
